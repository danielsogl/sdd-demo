pre-commit:
  parallel: true
  jobs:
    - name: format-check
      run: npx biome check --formatter-enabled=true --linter-enabled=false --assist-enabled=false {staged_files}
      glob: "*.{ts,tsx,js,jsx,json,css}"

    - name: lint-check
      run: npx biome lint {staged_files}
      glob: "*.{ts,tsx,js,jsx}"
